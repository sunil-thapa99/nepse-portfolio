# Render Blueprint: https://render.com/docs/blueprint-spec
#
# CORS_ALLOW_ORIGINS (required for browser "Refresh data"):
# Set to the exact origin where the React app is served — scheme + host + port
# if non-default (e.g. https://my-dashboard.vercel.app). Comma-separate
# multiple origins. Without this, POST /refresh is blocked by the browser
# when the SPA is not on localhost.
#
# Frontend build: set VITE_API_BASE_URL to this service URL (no trailing slash)
# in the static host’s build env, e.g. https://nepse-portfolio-xxx.onrender.com

services:
  - type: web
    name: nepse-portfolio-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: CORS_ALLOW_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
