# Render Blueprint: https://render.com/docs/blueprint-spec
#
# CORS_ALLOW_ORIGINS (optional):
# Comma-separated origins for the hosted dashboard (scheme + host, no path).
# Leave unset or blank to use api_app._DEFAULT_CORS (local Vite + prod SPA).
# If you define this in the dashboard, never leave it as an empty string unless
# you redeployed api_app with empty→default fallback (older builds had no CORS headers).
#
# Frontend build: set VITE_API_BASE_URL to this service URL (no trailing slash)
# in the static host’s build env, e.g. https://nepse-portfolio-xxx.onrender.com

services:
  - type: web
    name: nepse-portfolio-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: CORS_ALLOW_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
