version: 2
updates:
    - package-ecosystem: pip
      directory: /
      schedule:
          interval: weekly

    - package-ecosystem: npm
      directory: /web
      schedule:
          interval: weekly
      groups:
          react:
              patterns:
                  - "react"
                  - "react-dom"
                  - "@types/react"
                  - "@types/react-dom"
                  - "@vitejs/plugin-react"
