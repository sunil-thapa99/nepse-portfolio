# MeroShare scheduled scrape: Selenium (Chrome headless) on ubuntu-latest.
#
# Required GitHub Actions secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_URL            — Supabase project URL
#   SUPABASE_SERVICE_KEY    — service_role JWT (not anon); required by supabase_client.py
#   ENCRYPTION_KEY          — Fernet key for decrypting MeroShare password from DB
#
# The job runs main.py --all-credential-users (one scrape per meroshare_credentials row).
#
# Verbose runner logging (use only when debugging; avoid leaving enabled):
#   Repository / org variables: ACTIONS_STEP_DEBUG=true (and optionally ACTIONS_RUNNER_DEBUG=true)
#
# Schedule note: workflow cron is UTC only. "0 13 * * *" is 08:00 in America/New_York during
# EST (standard time); during EDT it runs at 09:00 local. Pick a different UTC hour if you prefer
# closer alignment with 08:00 during daylight time instead.

name: MeroShare scrape

on:
    # schedule:
    #   - cron: "0 13 * * *"
    push:
        branches: [main]
    workflow_dispatch:

concurrency:
    group: meroshare-scrape
    cancel-in-progress: false

permissions:
    contents: read

jobs:
    scrape:
        runs-on: ubuntu-latest
        timeout-minutes: 60
        env:
            PYTHONUNBUFFERED: "1"
        steps:
            - uses: actions/checkout@v4

            - name: Remove existing Chrome
              run: sudo apt purge google-chrome-stable

            - uses: actions/setup-python@v5
              with:
                  python-version: "3.12"
                  cache: pip
                  cache-dependency-path: pyproject.toml

            - name: Install xvfb
              run: sudo apt-get install -y xvfb

            - name: Install package
              run: |
                  python -m pip install --upgrade pip
                  pip install .

            - name: Install system dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    libnss3 \
                    libxss1 \
                    libasound2t64 \
                    libatk-bridge2.0-0 \
                    libgtk-3-0

            - name: Run MeroShare scraper
              env:
                  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
                  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
                  ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
                  SCRAPE_USER_ID: ${{ secrets.SCRAPE_USER_ID }}
              run: python main.py --user-id "$SCRAPE_USER_ID" 2>&1 | tee output.log
